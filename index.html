<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  
<title>Web Structure Analyzer</title>
  
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body class="light">

<div class="container">

<header>
<h1>Web Structure Analyzer</h1>
<button id="themeToggle">Toggle Theme</button>
</header>

<section class="upload-section">

<div class="drop-area" id="dropArea">
<p>Drag & Drop HTML File</p>
<input type="file" id="fileInput" accept=".html">
</div>

<textarea id="codeInput" placeholder="Paste HTML code here"></textarea>

<button id="analyzeBtn">Analyze HTML</button>

</section>

<section class="dashboard">

<div class="card">
<h3>Code Metrics</h3>
<div id="metrics"></div>
</div>

<div class="card">
<h3>SEO Analysis</h3>
<div id="seo"></div>
</div>

<div class="card">
<h3>Accessibility</h3>
<div id="accessibility"></div>
</div>

<div class="card">
<h3>Security</h3>
<div id="security"></div>
</div>

<div class="card">
<h3>HTML Warnings</h3>
<div id="warnings"></div>
</div>

<div class="card">
<h3>Performance</h3>
<div id="performance"></div>
</div>

<div class="card full">
<h3>Tag Distribution</h3>
<canvas id="tagChart"></canvas>
</div>

<div class="card full">
<h3>Live Preview</h3>
<iframe id="preview"></iframe>
</div>

</section>

<button id="exportBtn">Download JSON Report</button>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
